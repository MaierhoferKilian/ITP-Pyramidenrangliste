{% extends "base.html" %}

{% block content %}
<style>
    .login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: var(--bg-color);
        color: var(--fg-color);
        gap: 20px;
    }
    .login-container img {
        width: 80px;
        height: auto;
    }
    .login-container h1 {
        font-family: var(--font);
        font-size: 1.5em;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
    }
    .login-container h2 {
        font-family: var(--font);
        font-size: 0.9em;
        font-weight: 400;
        letter-spacing: 1px;
        margin: 0;
        opacity: 0.7;
    }
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 320px;
        max-width: 90vw;
    }
    .login-form a {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        font-family: var(--font);
        font-size: 1em;
        padding: 12px 16px;
        border: 2px solid var(--fg-color);
        background: var(--fg-color);
        color: var(--bg-color);
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 700;
        transition: all 0.2s;
    }
    .login-form a:hover {
        background: transparent;
        color: var(--fg-color);
    }
    .login-error {
        color: #ff4444;
        font-family: var(--font);
        font-size: 0.85em;
        text-align: center;
    }
    .login-message {
        color: var(--fg-color);
        font-family: var(--font);
        font-size: 0.85em;
        text-align: center;
        opacity: 0.85;
    }
</style>

<div class="login-container">
    <img src="{{ url_for('static', filename='images/htlwy_logo.svg') }}" alt="HTLWY Logo">
    <h1>Tischtennis Rangliste</h1>
    <h2>Anmelden mit Schul-Email</h2>
    
    {% if error %}
    <p class="login-error">{{ error }}</p>
    {% endif %}

    {% if message %}
    <p class="login-message">{{ message }}</p>
    {% endif %}
    
    <div class="login-form">
        <a href="{{ url_for('start_login') }}">Mit Microsoft anmelden</a>
    </div>
</div>
{% endblock %}
